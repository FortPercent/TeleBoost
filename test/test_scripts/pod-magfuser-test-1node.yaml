apiVersion: batch.volcano.sh/v1alpha1
kind: Job
metadata:
  name: daily-magfuser-test-1node
spec:
  minAvailable: 1
  schedulerName: volcano
  # policies:
  #   - event: PodEvicted
  #     action: CompleteJob
  plugins:
    pytorch: [ "--port=25610" ]
    svc: [ "--disable-network-policy=true" ]
  tasks:
  - replicas: 1
    name: master
    template:
      spec:
        restartPolicy: Never
        hostNetwork: true
        dnsPolicy: ClusterFirstWithHostNet
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: usage
                  operator: In
                  values:
                  - infra
                # - key: kubernetes.io/hostname
                #   operator: In
                #   values:
                #   - zjzx1h-402-f-17-a1p1-sev-h100-08u05
                #   - zjzx1h-402-b-11-a1p1-sev-h100-08u05
                #   - zjzx1h-402-f-05-a1p1-sev-h100-08u05
                #   - zjzx1h-402-f-03-a1p1-sev-h100-08u05
                #   - zjzx1h-402-f-04-a1p1-sev-h100-08u05
                #   - zjzx1h-402-f-14-a1p1-sev-h100-08u05
                #   - zjzx1h-402-d-19-a1p1-sev-h100-08u05
        initContainers:
        #不修改，本次升级改动
        - name: init
          image: harbor.telecom-ai.com.cn/teleinfra/alpine:latest
          command: [ "/bin/ash" ]
          args:
          - "-c"
          - cp /nvfile-heatstorage/teleai-infra/look_mlxdevice.sh /ib-config
          volumeMounts:
          - name: shared-volume
            mountPath: /nvfile-heatstorage
          - name: ib-config
            mountPath: /ib-config
        containers:
        - name: master
          resources:
            requests:
              cpu: 48
              memory: 512G
              nvidia.com/gpu: 8
            limits:
              cpu: 48
              memory: 512G
              nvidia.com/gpu: 8
          # image: harbor.telecom-ai.com.cn/teleinfra/ncvr-torch2.5-cuda12.4:v0.3
          # image: harbor.telecom-ai.com.cn/teleinfra/diagnose:v0.8
          image: harbor.telecom-ai.com.cn/teleai-t2v/ncvr-torch2.5-cuda12.4:v0.2
          # image: harbor.telecom-ai.com.cn/teleinfra/verl:24.05-py3-apex 
          # image: harbor.telecom-ai.com.cn/teleinfra/megatron_vase:v0.1_24.05
          # image: harbor.telecom-ai.com.cn/teleinfra/nvidia-pytorch:23.11-py3
          # image: harbor.telecom-ai.com.cn/teleinfra/pytorch:25.03-py3
          # image: harbor.telecom-ai.com.cn/teleinfra/ubuntu22_torch25_cuda12:v2.6
          command: [ "/bin/bash" ]
          args:
          - "-c"
          - |
            export NCCL_IB_HCA=$(/nvfile-heatstorage/teleai-infra/look_mlxdevice.sh) #必须有，不修改，本次升级改动
            echo NCCL_IB_HCA=$NCCL_IB_HCA
            export NCCL_ALGO=RING
            cd /nvfile-heatstorage/teleai-infra/magfuser_daily_test/
            bash test_scripts/install_expect.sh
            rm -rf Megatron_VAST 
            ./test_scripts/pull_repo.sh main
            cp test_scripts/pipeline.py Megatron_VAST/megatron/core/models/hunyuan/
            cd Megatron_VAST 
            cp /nvfile-heatstorage/teleai-infra/magfuser_daily_test/test_scripts/run_unified.sh ./
            # rm ../test_data/tp*.log
            bash ../test_scripts/setup_environ.sh
            cp ../test_scripts/hunyuanvideo_i2vhy_fakedata.py hunyuanvideo/configs/hunyuanvideo_i2vhy.py
            CUDA_VISIBLE_DEVICES=4 MASTER_PORT=11345 bash run_unified.sh 1 1 &
            pid0=$!
            CUDA_VISIBLE_DEVICES=0,1 MASTER_PORT=12345 bash run_unified.sh 1 2 &
            pid1=$!
            CUDA_VISIBLE_DEVICES=2,3 MASTER_PORT=12335 bash run_unified.sh 2 1 &
            pid2=$!
            CUDA_VISIBLE_DEVICES=4,5,6,7 MASTER_PORT=12365 bash run_unified.sh 2 2 &
            pid3=$!
            wait $pid0
            echo "finish tp1 cp1 $pid0"
            wait $pid1 
            echo "finish tp1 cp2 $pid1"
            wait $pid2
            echo "finish tp2 cp1 $pid2"
            wait $pid3
            echo "finish tp2 cp2 $pid3"
            cd ../test_scripts
            python verify_accuracy.py

          securityContext:
            privileged: true
            # capabilities:
            #   add: [ "IPC_LOCK" ]
            # ports:
            #   - containerPort: 5670
            # workingDir: /nvfile-heatstorage/tele_data_share/lt/Megatron_VAST
          volumeMounts:
          - name: dshm
            mountPath: /dev/shm
          - name: shared-volume
            mountPath: /nvfile-heatstorage
          - name: ib-config #必须有，不修改，本次升级改动
            mountPath: /ib-config
          - name: data02
            mountPath: /data02
        volumes:
        - name: dshm
          emptyDir:
            medium: Memory
          # hostPath:
          #   path: /dev/shm
          #   type: Directory
        - name: shared-volume
          hostPath:
            path: /nvfile-heatstorage
            type: Directory
        - name: ib-config #必须有，不修改，本次升级改动
          emptyDir:
            medium: ""
            sizeLimit: "500Mi"
        - name: data02
          hostPath:
            path: /data02
            type: Directory
        - name: vsixs
          hostPath:
            path: /nvfile-heatstorage/tele_data_share/public/vsixs
        securityContext:
          runAsUser: 0