hydra:
  searchpath:
    # import-verl mode: verl is installed via pip; resolve `ppo_trainer` defaults
    # through the package's `verl.trainer.config` package, not a vendored verl/ dir.
    - pkg://verl.trainer.config

defaults:
  - ppo_trainer
  - _self_

trainer:
  type: diffusion
  use_rm: True

data:
  type: diffusion

actor_rollout_ref:
  type: diffusion
  wan_version: wan21
  model:
    vae_model_path: data/flux
    data_json_path: data/rl_embeddings/videos2caption.json
  
  actor:
    timestep_fraction: 0.6
    clip_range: 1e-4
    adv_clip_max: 5.0
    eta: 0.3
    max_grad_norm: 1.0
    
    # GRPO-Guard (paper arxiv 2510.22319).  RatioNorm and grad-reweight are
    # exposed as separable levers per the paper's §4.3 ablation
    # (Mean-revised / RatioNorm / GRPO-Guard combined).  See
    # ``algorithms/grpo_guard.py`` for the formulas.
    grpo_guard:
      enable: false
      ratio_norm: false           # Eq. 8: rewrite policy ratio with Δμ-bias term
      grad_reweight: false        # Eq. 12: rescale policy loss by δ = β/dt
      grad_reweight_form: flow_grpo   # 'flow_grpo' (δ=1/dt) or 'dancegrpo' (δ=(1+η²(1-t)/(2t))/dt)
      ratio_norm_eps: 1e-6
      grad_reweight_eps: 1e-6     # also doubles as the t-floor for the dancegrpo form
      grad_reweight_alpha: 1.0    # currently unused; reserved for future weighting experiments
  
  rollout:
    ulysses_sequence_parallel_size: 1.0
  
  video_fps: 25
  guide_scale: 5.0
  cfg: 0.0
  h: 720
  w: 720
  num_frames: 1
  sampling_steps: 16
  lr_warmup_steps: 0
  use_hpsv2: True
  shift: 8.0
  timestep_fraction: 0.6
  init_same_noise: True
  
  # Tokenizer path (relative to model path)
  tokenizer_path: google/umt5-xxl
  
  # VAE configuration
  # vae_stride: Spatial/temporal compression ratio [temporal, height, width]
  vae_stride: [4, 8, 8]
  # latent_channels: Number of channels in VAE latent space
  latent_channels: 16

  pixel_weight:
    enable: false
    model_path: "facebook/dinov2-large"
    pca_method: weighted
    sigma: 1.0
    assert_latent_5d: true
    kl_loss_compatible: false

  # if fast flow-grpo
  flow_grpo:
    enable: true
    sde_window_size: 2
    sde_window_range: [0, "${actor_rollout_ref.sampling_steps}"]
    shuffle_timesteps: false
  # if standard flow-grpo
  # flow_grpo:
  #   enable: true
  #   sde_window_size: 0

reward_model:
  enable: True
  micro_batch_size_per_gpu: 1
  
  strategy: diffusion

  # Reward model type options:
  # - single: Use a single model specified by model_name (recommended)
  # - joint: Use multiple reward models from 'joint.models' list
  # - qwen: Legacy alias for single mode with qwen model
  type: single

  # Model name for single mode (must be registered in RewardRegistry)
  # Available: aesthetic, hps, raft, videoclip, videophy, qwen
  model_name: hps
  
  # Model configuration
  model:
    path: ""  # Path to model weights (can also be in extra_config)
  
  # Model-specific extra configuration
  extra_config:
    model_type: ViT-H-14  # Example for HPS
  
  # Whether to normalize rewards
  normalize: true

  # ============================================================
  # DYNAMIC JOINT REWARD CONFIGURATION (used when type: joint)
  # ============================================================
  # This section allows you to configure ANY number of reward models
  # with individual weights, GPU allocation, and MPS settings.
  joint:
    # Aggregation method: weighted_sum, mean, max, min
    aggregation: weighted_sum
    
    # Whether to normalize each model's output before aggregation
    normalize_individual: true
    
    # Whether to normalize the final aggregated output
    normalize_final: false
    
    # Whether to compute rewards in parallel (recommended)
    parallel_compute: true
    
    # MPS (CUDA Multi-Process Service) configuration
    # Allows fine-grained GPU resource allocation per model
    mps:
      enabled: true
      default_percentage: 25  # Default MPS percentage if not specified per model
      # Per-model MPS percentage overrides
      model_percentages:
        aesthetic: 20
        raft: 30
        videoclip: 25
        videophy: 25
    
    # Dictionary of reward models to use (keyed by model name)
    # This allows direct access via Hydra overrides, e.g.:
    #   reward_model.joint.models.aesthetic.extra_config.clip_model_path=/new/path
    # Each model MUST have a registered name in the reward_models/ registry
    # You can add/remove models freely - just ensure they are registered
    #
    # Dispatch design: every reward model runs on every GPU (dp_fraction=1.0,
    # rank_offset=0).  Reward workers co-locate with the actor on each GPU and
    # share thread budget via CUDA MPS (see `mps.model_percentages` above).
    # The earlier disjoint scheme (dp_fraction=0.25 + rank_offset=0/2/4/6) was
    # never wired up correctly: `_allgather_rewards` calls `dist.all_gather`
    # on the default world process group, so any dp_size != world_size triggers
    # `expected length=world_size, got=dp_size`.  Until the codebase grows real
    # sub-group support, all-active is the only correct dispatch.
    models:
      aesthetic:
        enabled: true
        weight: 1.0
        dp_fraction: 1.0       # all-active: every reward on every GPU
        rank_offset: 0
        mps_percentage: 20     # 20% of GPU threads (overrides mps.model_percentages)
        normalize: true
        model_path: ""
        extra_config:
          clip_model_path: /root/models/aesthetic/ViT-L-14.pt
          aes_model_path: /root/models/aesthetic/sa_0_4_vit_l_14_linear.pth

      raft:
        enabled: true
        weight: 1.0
        dp_fraction: 1.0
        rank_offset: 0
        mps_percentage: 30
        normalize: true
        model_path: /root/models/raft/raft-things.pth
        extra_config:
          stride: 1
          iters: 20

      videoclip:
        enabled: true
        weight: 1.5            # Higher weight = more influence
        dp_fraction: 1.0
        rank_offset: 0
        mps_percentage: 25
        normalize: true
        model_path: /root/models/VideoCLIP-XL/VideoCLIP-XL.bin
        extra_config:
          num_frames: 8
          target_size: 224

      videophy:
        enabled: true
        weight: 0.8            # Lower weight
        dp_fraction: 1.0
        rank_offset: 0
        mps_percentage: 25
        normalize: true
        model_path: /root/models/videocon_physics
        extra_config:
          max_length: 256

      # Example: Adding HPS model (disabled by default)
      # hps:
      #   enabled: false
      #   weight: 1.0
      #   dp_fraction: 1.0
      #   rank_offset: 0
      #   mps_percentage: 15
      #   model_path: /root/models/hps/hpsv2.pt
      #   extra_config:
      #     model_type: ViT-H-14

  reward_manager: dancegrpo
  
  # Rollout model config.
  rollout:

    # actor_rollout_ref.rollout.name: hf/vllm/sglang.
    name: vllm

    # sync: LLM, async: AsyncLLM
    mode: sync

    # Sampling temperature for rollout.
    temperature: 1.0

    # Top-k sampling parameter. -1 for vLLM rollout, 0 for HF rollout.
    top_k: -1

    # Top-p sampling parameter. Default 1.0.
    top_p: 1

    # https://arxiv.org/abs/2410.21236
    use_fire_sampling: False

    # typically the same as data max prompt length
    prompt_length: ${data.max_prompt_length}

    # typically the same as data max response length
    response_length: ${data.max_response_length}

    # for vllm rollout
    # Rollout model parameters type. Align with actor model's FSDP/Megatron type.
    dtype: bfloat16

    # Fraction of GPU memory used by vLLM/SGLang for KV cache.
    gpu_memory_utilization: 0.5

    # Whether to ignore EOS and continue generating after EOS is hit.
    ignore_eos: False

    # Whether to disable CUDA graph. Default True to allow cache freeing.
    enforce_eager: True

    # Whether to free engine KVCache after generation. Set enforce_eager=True when enabled.
    free_cache_engine: True

    # Which loader to use for rollout model weights: dummy_dtensor, hf, megatron, etc.
    # safetensors (for huge model, and set use_shm=True); dummy_dtensor: randomly init model weight
    load_format: dummy_dtensor

    # for huge model, layered summon can save memory (prevent OOM) but make it slower
    layered_summon: False

    # TP size for rollout. Only effective for vLLM.
    tensor_model_parallel_size: 4

    # max number of tokens in a batch
    max_num_batched_tokens: 8192

    # max length for rollout
    max_model_len: 1024

    # max length of sequences
    max_num_seqs: 1024

    # [Will be deprecated, use log_prob_micro_batch_size_per_gpu] The batch size for one forward pass in the computation of log_prob. Global batch size.
    log_prob_micro_batch_size: null

    # The batch size for one forward pass in the computation of log_prob. Local batch size per GPU.
    log_prob_micro_batch_size_per_gpu: null

    # enable dynamic batch size (sequence packing) for log_prob computation
    log_prob_use_dynamic_bsz: ${actor_rollout_ref.actor.use_dynamic_bsz}

    # max token length for log_prob computation
    log_prob_max_token_len_per_gpu: ${actor_rollout_ref.actor.ppo_max_token_len_per_gpu}

    # disable logging statistics
    disable_log_stats: True

    # may get higher throughput when set to True. When activated, Please increase max_num_batched_tokens or decrease max_model_len.
    enable_chunked_prefill: True

    # for hf rollout
    # Whether to sample during training rollout. False uses greedy sampling.
    do_sample: True

    # number of responses (i.e. num sample times). > 1 for grpo
    n: 1

use_rm: True # use_reward_model

# ============================================================================
# BGPO: Bayesian-Prior Group Optimization
# ----------------------------------------------------------------------------
# Two branches:
#   CRT (use_rerange)        : rearranges per-sample rewards before advantage
#                              computation, using a prior-based sign + sigmoid.
#   RAS (adaptive_weight_*)  : scales the scalar advantage with a per-group
#                              weight computed from posterior statistics.
# Both branches share the `enable` flag.  When `enable: false`, BGPO is a
# no-op and the trainer runs the original baseline path.
# ============================================================================
algorithm:
  bgpo:
    enable: false

    # --- CRT: reward rearrangement --------------------------------------
    use_rerange: false
    rerange_method: binary         # currently only "binary"
    rerange_a: 50.0                # slope term in the rerange formula
    rerange_temperature: 5.0       # temperature in sigmoid; must be > 0
    # When true, reward-only copies of the batch are appended with reranged
    # rewards. Keep this disabled unless the extra memory cost is intended.
    append_rerange_samples: false

    # --- RAS: adaptive advantage scaling --------------------------------
    adaptive_weight_method: bayes              # no | bayes | random | cvpr
    adaptive_weight_discriminate_method: normal  # normal | reverse
    adaptive_weight_weight_method: std_pos       # fix | std_pos | std_neg | random
    adaptive_weight_fix_weight: 0.0

    # bayes mode
    prior_var: 1.0
    bayes_weight_range: [0.5, 1.5]

    # cvpr std mode
    use_std_runningmean: false
    neg_base: 1.005
    scale_neg: 0.01

    # Loss coupling with adaptive weight:
    # `advantage *= clamp(1 + alpha * w, min_adv_scale, max_adv_scale)`.
    regularization_term_alpha: 1.0
    min_adv_scale: 0.01
    max_adv_scale: 10.0

    # Numerical-stability clamp for `exp(-r/T)` in CRT.
    exp_clamp: 30.0
