name: FAST-VQA-B-Refactor-1*4
num_epochs: 30
l_num_epochs: 0
warmup_epochs: 2.5
ema: true
save_model: true
batch_size: 16
num_workers: 6

wandb:
    project_name: VQA_Experiments_2024

data:
    test-data:
        type: KoalaDataset
        args:
            phase: test
            anno_file: ./sample/video_list.txt
            data_prefix:  ./sample/video/
            sample_types:
                #resize:
                #    size_h: 224
                #    size_w: 224
                fragments:
                    fragments_h: 1
                    fragments_w: 1
                    fsize_h: 720
                    fsize_w: 1280
                    aligned: 1
                    clip_len: 9
                    frame_interval: 1
                    num_clips: 1
model:
    type: DiViDeAddEvaluator
    args:
        backbone:
            fragments:
                checkpoint: false
                pretrained: 
        backbone_size: swin_tiny_grpb
        backbone_preserve_keys: fragments
        divide_head: false
        vqa_head:
            in_channels: 768
            hidden_channels: 64
            
optimizer:
    lr: !!float 1e-3
    backbone_lr_mult: !!float 1e-1
    wd: 0.05
        
load_path: ckpt/infer.pth
test_load_path: ckpt/infer.pth